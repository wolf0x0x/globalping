name: SEO health check

on:
  schedule:
    - cron: "43 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  seo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Build
        run: npm run build
      - name: SEO health
        run: npm run check:seo && npm run check:i18n && npm run check:release
